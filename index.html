<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arapça-Türkçe Flashcard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }

    h1 {
      color: #fff;
      margin-bottom: 30px;
      font-size: 1.8rem;
    }

    .card-container {
      perspective: 1000px;
      cursor: pointer;
    }

    .card {
      width: 300px;
      height: 200px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .card-front {
      background: linear-gradient(145deg, #2d3561, #1e2243);
      border: 2px solid #4a5568;
    }

    .card-front span {
      color: #e2e8f0;
      font-size: 2rem;
      font-weight: 600;
    }

    .card-back {
      background: linear-gradient(145deg, #2d3561, #1e2243);
      border: 2px solid #4a5568;
      transform: rotateY(180deg);
    }

    .card-back span {
      color: #68d391;
      font-size: 1.8rem;
      font-weight: 600;
    }

    .hint {
      color: #a0aec0;
      margin-top: 20px;
      font-size: 0.9rem;
    }

    .level-select {
      margin-bottom: 20px;
    }

    .level-select select {
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid #4a5568;
      background: #2d3561;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }

    .controls {
      margin-top: 30px;
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .rating-buttons {
      display: none;
      gap: 10px;
    }

    .rating-buttons.visible {
      display: flex;
    }

    .btn-again {
      background: #e53e3e;
    }
    .btn-again:hover {
      background: #c53030;
    }

    .btn-hard {
      background: #dd6b20;
    }
    .btn-hard:hover {
      background: #c05621;
    }

    .btn-good {
      background: #38a169;
    }
    .btn-good:hover {
      background: #2f855a;
    }

    .btn-easy {
      background: #3182ce;
    }
    .btn-easy:hover {
      background: #2b6cb0;
    }

    .stats {
      color: #a0aec0;
      margin-top: 20px;
      font-size: 0.85rem;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #4a5568;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.3s;
    }

    button:hover {
      background: #2d3748;
    }
  </style>
</head>
<body>
  <h1>Arapça - Türkçe Kelime Kartları</h1>
  
  <div class="level-select">
    <select id="level-filter" onchange="filterByLevel()">
      <option value="">Tüm Seviyeler</option>
      <option value="A1">A1</option>
      <option value="A2">A2</option>
      <option value="B1">B1</option>
      <option value="B2">B2</option>
      <option value="C1">C1</option>
      <option value="C2">C2</option>
    </select>
  </div>
  
  <div class="card-container" onclick="flipCard()">
    <div class="card" id="flashcard">
      <div class="card-face card-front">
        <span id="arabic-text"></span>
      </div>
      <div class="card-face card-back">
        <span id="turkish-text"></span>
      </div>
    </div>
  </div>
  
  <p class="hint">Kartı çevirmek için tıklayın</p>
  
  <div class="controls">
    <button onclick="previousCard()">← Önceki</button>
    <button onclick="nextCard()">Sonraki →</button>
  </div>

  <div class="rating-buttons" id="rating-buttons">
    <button class="btn-again" onclick="rateCard('again')">Tekrar (1g)</button>
    <button class="btn-hard" onclick="rateCard('hard')">Zor (2g)</button>
    <button class="btn-good" onclick="rateCard('good')">İyi (4g)</button>
    <button class="btn-easy" onclick="rateCard('easy')">Kolay (7g)</button>
  </div>

  <p class="stats" id="stats"></p>

  <script>
    let allWords = [];
    let filteredWords = [];
    let currentIndex = 0;
    let currentLevel = '';

    const STORAGE_KEY = 'flashcard-progress';

    fetch('./data.json')
      .then(response => response.json())
      .then(data => {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        allWords = data.map(w => {
          const savedCard = saved.find(s => s.arabic === w.arabic && s.turkish === w.turkish && s.level === w.level);
          return savedCard ? { ...w, ...savedCard } : {
            ...w,
            easeFactor: 2.5,
            interval: 0,
            dueDate: 0,
            reviews: 0
          };
        });
        filterByLevel();
      })
      .catch(error => console.error('Error loading words:', error));

    function filterByLevel() {
      currentLevel = document.getElementById('level-filter').value;
      filteredWords = currentLevel 
        ? allWords.filter(w => w.level === currentLevel)
        : [...allWords];
      showNextDueCard();
    }

    function showNextDueCard() {
      if (filteredWords.length === 0) {
        document.getElementById('arabic-text').textContent = 'Kelime yok';
        document.getElementById('turkish-text').textContent = '';
        document.getElementById('rating-buttons').classList.remove('visible');
        return;
      }
      const now = Date.now();
      const dueCard = filteredWords.find(w => w.dueDate <= now);
      currentIndex = dueCard ? filteredWords.indexOf(dueCard) : 0;
      showCard(currentIndex);
    }

    function showCard(index) {
      document.getElementById('arabic-text').textContent = filteredWords[index].arabic;
      document.getElementById('turkish-text').textContent = filteredWords[index].turkish;
      document.getElementById('flashcard').classList.remove('flipped');
      document.getElementById('rating-buttons').classList.remove('visible');
      updateStats();
    }

    function flipCard() {
      const card = document.getElementById('flashcard');
      card.classList.toggle('flipped');
      if (card.classList.contains('flipped')) {
        document.getElementById('rating-buttons').classList.add('visible');
      }
    }

    function rateCard(rating) {
      const card = filteredWords[currentIndex];
      const now = Date.now();
      const dayMs = 24 * 60 * 60 * 1000;

      if (rating === 'again') {
        card.interval = 1;
        card.easeFactor = Math.max(1.3, card.easeFactor - 0.2);
      } else if (rating === 'hard') {
        card.interval = Math.max(1, Math.round(card.interval * 1.2));
        card.easeFactor = Math.max(1.3, card.easeFactor - 0.15);
      } else if (rating === 'good') {
        card.interval = card.interval === 0 ? 1 : Math.round(card.interval * card.easeFactor);
      } else if (rating === 'easy') {
        card.interval = card.interval === 0 ? 4 : Math.round(card.interval * card.easeFactor * 1.3);
        card.easeFactor += 0.15;
      }

      card.dueDate = now + (card.interval * dayMs);
      card.reviews++;
      saveProgress();
      showNextDueCard();
    }

    function nextCard() {
      if (filteredWords.length === 0) return;
      currentIndex = (currentIndex + 1) % filteredWords.length;
      showCard(currentIndex);
    }

    function previousCard() {
      if (filteredWords.length === 0) return;
      currentIndex = (currentIndex - 1 + filteredWords.length) % filteredWords.length;
      showCard(currentIndex);
    }

    function updateStats() {
      if (filteredWords.length === 0) {
        document.getElementById('stats').textContent = 'Bu seviyede kelime yok';
        return;
      }
      const now = Date.now();
      const dueCount = filteredWords.filter(w => w.dueDate <= now).length;
      const total = filteredWords.length;
      const card = filteredWords[currentIndex];
      const intervalText = card.interval > 0 ? `${card.interval}g` : 'yeni';
      const levelBadge = currentLevel ? ` | Seviye: ${currentLevel}` : '';
      document.getElementById('stats').textContent = 
        `Kart ${currentIndex + 1}/${total} | Due: ${dueCount} | Aralık: ${intervalText}${levelBadge}`;
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(allWords));
    }
  </script>
</body>
</html>
